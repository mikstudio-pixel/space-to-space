<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>Space-to-Space - Video</title>
    <script src="js/theme-preload.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="contact-video-page" data-page="project-video">

    <div class="overlay-ui">
        
        <nav class="side-nav left">
            <div class="side-nav-group">
                <a href="index.html" class="side-nav-brand">SPACE 2 SPACE</a>
            </div>
            <div class="side-nav-group">
                <a href="index.html?intro=0">projects</a>
                <a href="about.html">about</a>
            </div>
        </nav>

        <nav class="theme-nav" aria-label="Theme toggle">
            <button id="darkModeToggle" type="button">light</button>
        </nav>
        
        <div class="controls">
            <div class="control-row">
                <label for="colorModeToggle">B/W Mode</label>
                <button id="colorModeToggle" class="toggle-btn">○</button>
            </div>
            <div class="control-row">
                <label for="videoModeToggle">1 Video Perspective</label>
                <button id="videoModeToggle" class="toggle-btn">○</button>
            </div>
            <label for="depthSlider">Tunnel Depth</label>
            <input type="range" id="depthSlider" min="1" max="5000" value="1000">
        </div>
    </div>

    <div class="scene">
        <!-- SVG Wireframe Layer -->
        <svg id="wireframe" class="wireframe-overlay">
            <line class="depth-line tl"></line>
            <line class="depth-line tr"></line>
            <line class="depth-line bl"></line>
            <line class="depth-line br"></line>
            <polygon class="back-rect"></polygon>
        </svg>

        <div class="room">
            <div class="wall ceiling">
                <div class="zone-content ceiling-content video-surface">
                    <video class="surface-video is-projected" autoplay muted loop playsinline preload="metadata" data-sync-video="ceiling">
                        <source src="assets/USTP/Ron Feldman, Felix Stängle, Kateryna Simson_Lucid Dreams MAV 5786/Media/mav_trailer_exp1_web.mp4" type="video/mp4">
                    </video>
                    <canvas class="surface-canvas is-projected" data-perspective-canvas="ceiling"></canvas>
                </div>
            </div>
            <div class="wall floor">
                <div class="zone-content floor-content video-surface">
                    <video class="surface-video is-projected" autoplay muted loop playsinline preload="metadata" data-sync-video="floor">
                        <source src="assets/USTP/Ron Feldman, Felix Stängle, Kateryna Simson_Lucid Dreams MAV 5786/Media/mav_trailer_exp1_web.mp4" type="video/mp4">
                    </video>
                    <canvas class="surface-canvas is-projected" data-perspective-canvas="floor"></canvas>
                </div>
            </div>
            <div class="wall left-wall">
                <div class="zone-content left-content video-surface">
                    <video class="surface-video is-projected" autoplay muted loop playsinline preload="metadata" data-sync-video="left">
                        <source src="assets/USTP/Ron Feldman, Felix Stängle, Kateryna Simson_Lucid Dreams MAV 5786/Media/mav_trailer_exp1_web.mp4" type="video/mp4">
                    </video>
                    <canvas class="surface-canvas is-projected" data-perspective-canvas="left"></canvas>
                </div>
            </div>
            <div class="wall right-wall">
                <div class="zone-content right-content video-surface">
                    <video class="surface-video is-projected" autoplay muted loop playsinline preload="metadata" data-sync-video="right">
                        <source src="assets/USTP/Ron Feldman, Felix Stängle, Kateryna Simson_Lucid Dreams MAV 5786/Media/mav_trailer_exp1_web.mp4" type="video/mp4">
                    </video>
                    <canvas class="surface-canvas is-projected" data-perspective-canvas="right"></canvas>
                </div>
            </div>
            <div class="wall back-wall">
                <!-- Invisible markers for tracking corners -->
                <div class="marker tl"></div>
                <div class="marker tr"></div>
                <div class="marker bl"></div>
                <div class="marker br"></div>
                
                <div class="zone-content back-content video-surface is-flat">
                    <video class="surface-video is-flat" autoplay muted loop playsinline preload="metadata" data-sync-video="back" data-sync-master="true">
                        <source src="assets/USTP/Ron Feldman, Felix Stängle, Kateryna Simson_Lucid Dreams MAV 5786/Media/mav_trailer_exp1_web.mp4" type="video/mp4">
                    </video>
                    <canvas class="surface-canvas is-flat" data-perspective-canvas="back"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/audio-toggle.js"></script>
    <script src="js/contact-video.js"></script>
    <script src="js/theme-toggle.js"></script>
</body>
</html>
