<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space-to-Space - Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="gallery-page">
    <div class="gallery-intro" aria-hidden="true">
        <div class="gallery-intro-title">space to space</div>
    </div>

    <div class="overlay-ui">
        
        <nav class="side-nav left">
            <a href="index.html">animation</a>
            <a href="home.html">home</a>
            <a href="contact.html">video</a>
            <a href="#" class="active">gallery</a>
        </nav>
        
        <nav class="outline-nav" aria-label="Gallery items">
            <div class="outline-nav-items"></div>
        </nav>

        <div class="controls">
            <div class="control-row">
                <label for="darkModeToggle">Dark Mode</label>
                <button id="darkModeToggle" class="toggle-btn">○</button>
            </div>
            <div class="control-row">
                <label for="colorModeToggle">B/W Mode</label>
                <button id="colorModeToggle" class="toggle-btn">○</button>
            </div>
            <div class="control-row">
                <label for="galleryModeToggle">Gallery Mode</label>
                <button id="galleryModeToggle" class="toggle-btn">○</button>
            </div>
            <!-- Scroll hint -->
            <div style="margin-top: 20px; font-size: 10px; opacity: 0.7;">
                SCROLL TO NAVIGATE
            </div>
        </div>
    </div>

    <div class="scene">
        <!-- SVG Wireframe Layer -->
        <svg id="wireframe" class="wireframe-overlay">
            <line class="depth-line tl"></line>
            <line class="depth-line tr"></line>
            <line class="depth-line bl"></line>
            <line class="depth-line br"></line>
            <polygon class="back-rect"></polygon>
        </svg>

        <div class="room">
            <div class="wall ceiling"></div>
            <div class="wall floor"></div>
            <div class="wall left-wall"></div>
            <div class="wall right-wall"></div>
            
            <!-- Dynamic project partitions will be added here via JS -->
            
            <div class="wall back-wall">
                <!-- Invisible markers for tracking corners -->
                <div class="marker tl"></div>
                <div class="marker tr"></div>
                <div class="marker bl"></div>
                <div class="marker br"></div>
            </div>
        </div>
    </div>

    <script src="gallery.js"></script>
    <script src="theme-toggle.js"></script>
</body>
</html>
