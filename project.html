<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>Space-to-Space - Project</title>
    <script src="js/theme-preload.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="project-page" data-page="project">

    <div class="overlay-ui">
        
        <nav class="side-nav left">
            <div class="side-nav-group">
                <a href="index.html" class="side-nav-brand">SPACE TO SPACE</a>
            </div>
            <div class="side-nav-group">
                <a href="index.html?intro=0">projects</a>
                <a href="about.html">about</a>
            </div>
        </nav>

        <nav class="theme-nav" aria-label="Theme toggle">
            <button id="darkModeToggle" type="button">light</button>
        </nav>
        
        <nav class="outline-nav" aria-label="Page sections">
            <div class="outline-nav-items"></div>
        </nav>

        <div class="debug-controls" aria-label="Debug controls">
            <div class="debug-control-row">
                <label for="mediaDebugToggle">Media Debug</label>
                <button id="mediaDebugToggle" class="toggle-btn" data-media-debug-toggle aria-pressed="false">○</button>
            </div>
        </div>

        <div class="controls">
            <div class="control-row">
                <label for="colorModeToggle">B/W Mode</label>
                <button id="colorModeToggle" class="toggle-btn">○</button>
            </div>
            <label for="depthSlider">Room Depth</label>
            <input type="range" id="depthSlider" min="0" max="20000" value="120">
            <p id="projectStatus" class="project-status" hidden></p>
        </div>
    </div>

    <div class="scene">
        <!-- SVG Wireframe Layer -->
        <svg id="wireframe" class="wireframe-overlay">
            <line class="depth-line tl"></line>
            <line class="depth-line tr"></line>
            <line class="depth-line bl"></line>
            <line class="depth-line br"></line>
            <polygon class="back-rect"></polygon>
        </svg>

        <div class="room">
            <div class="wall ceiling"></div>
            <div class="wall floor"></div>
            <div class="wall left-wall"></div>
            <div class="wall right-wall"></div>
            <div class="wall back-wall">
                <!-- Invisible markers for tracking corners -->
                <div class="marker tl"></div>
                <div class="marker tr"></div>
                <div class="marker bl"></div>
                <div class="marker br"></div>
                
                <!-- Back Wall Content Zone -->
                <div class="zone-content back-content project-page-projects"></div>
            </div>
            
            <!-- Floor Content Zone (Placed inside room context) -->
            <div class="zone-wrapper floor-wrapper">
                <div class="zone-content floor-content project-page-projects"></div>
            </div>

            <!-- Ceiling Content Zone -->
            <div class="zone-wrapper ceiling-wrapper">
                <div class="zone-content ceiling-content project-page-projects"></div>
            </div>

        </div>
    </div>

    <script src="data/projects-data.js"></script>
    <script src="js/script.js"></script>
    <script src="js/media-debug-toggle.js"></script>
    <script src="js/project-detail.js"></script>
    <script src="js/contact-video.js"></script>
    <script src="js/theme-toggle.js"></script>
</body>
</html>
